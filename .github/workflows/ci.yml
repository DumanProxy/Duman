name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.23']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        shell: bash
        run: |
          go test $(go list ./... | grep -v '/proxy$' | grep -v '/benchmark$') \
            -count=1 -short -timeout 10m

      # Race detector disabled for now — known benign races in Server.listener
      # fields across pgwire, mysqlwire, relay, proxy packages (Addr() polled
      # from test goroutine while ListenAndServe assigns listener). Will fix
      # with listener mutex pattern across all servers.
      # - name: Test with race detector
      #   if: matrix.os == 'ubuntu-latest'
      #   run: |
      #     go test $(go list ./... | grep -v '/proxy$' | grep -v '/benchmark$') \
      #       -race -count=1 -short -timeout 15m

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Vet
        run: go vet ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build all platforms
        run: |
          mkdir -p dist
          build() {
            local os=$1 arch=$2 ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            echo "Building $os/$arch..."
            GOOS=$os GOARCH=$arch go build -ldflags="-s -w" \
              -o "dist/duman-client-${os}-${arch}${ext}" ./cmd/duman-client/
            GOOS=$os GOARCH=$arch go build -ldflags="-s -w" \
              -o "dist/duman-relay-${os}-${arch}${ext}" ./cmd/duman-relay/
          }
          build linux amd64
          build linux arm64
          build darwin amd64
          build darwin arm64
          build windows amd64

      - name: Copy config examples
        run: |
          cp dist/client.yaml dist/client.example.yaml 2>/dev/null || true
          cp dist/server.yaml dist/server.example.yaml 2>/dev/null || true
          cp configs/*.yaml dist/ 2>/dev/null || true

      - name: Create checksums
        run: |
          cd dist
          sha256sum duman-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/duman-client-*
            dist/duman-relay-*
            dist/checksums.txt
