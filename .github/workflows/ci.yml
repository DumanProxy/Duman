name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.23']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        run: |
          go test $(go list ./... | grep -v '/proxy$' | grep -v '/benchmark$') \
            -count=1 -short -timeout 10m

      - name: Test with race detector
        if: matrix.os == 'ubuntu-latest'
        run: |
          go test $(go list ./... | grep -v '/proxy$' | grep -v '/benchmark$') \
            -race -count=1 -short -timeout 15m

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Vet
        run: go vet ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build all platforms
        run: |
          mkdir -p dist
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for platform in "${platforms[@]}"; do
            IFS='/' read -r GOOS GOARCH <<< "$platform"
            ext=""
            if [ "$GOOS" = "windows" ]; then ext=".exe"; fi

            echo "Building $GOOS/$GOARCH..."
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="-s -w" \
              -o "dist/duman-client-${GOOS}-${GOARCH}${ext}" ./cmd/duman-client/
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="-s -w" \
              -o "dist/duman-relay-${GOOS}-${GOARCH}${ext}" ./cmd/duman-relay/
          done

      - name: Copy config examples
        run: |
          cp dist/client.yaml dist/client.example.yaml 2>/dev/null || true
          cp dist/server.yaml dist/server.example.yaml 2>/dev/null || true
          cp configs/*.yaml dist/ 2>/dev/null || true

      - name: Create checksums
        run: |
          cd dist
          sha256sum duman-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/duman-client-*
            dist/duman-relay-*
            dist/checksums.txt
